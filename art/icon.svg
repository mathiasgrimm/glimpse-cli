<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="glimpse icon">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="#2a3142"/>
    </pattern>
    <radialGradient id="dotfade" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.4" stop-color="#000000"/>
      <stop offset="1" stop-color="#ffffff"/>
    </radialGradient>
    <radialGradient id="glowAccent">
      <stop offset="0" stop-color="#6088d5" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#6088d5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#0a0b0f"/>

  <mask id="dotmask">
    <rect width="512" height="512" fill="url(#dotfade)"/>
  </mask>
  <rect width="512" height="512" fill="url(#dots)" opacity="0.3" mask="url(#dotmask)"/>

  <circle cx="256" cy="256" r="230" fill="url(#glowAccent)"/>

  <g transform="translate(256 256) scale(2.3) translate(-100 -100)">
    <g stroke="#e6e6e3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M22 100 Q100 54 178 100 Q100 146 22 100 Z"/>
      <circle cx="100" cy="100" r="22"/>
    </g>
    <circle cx="100" cy="100" r="6.5" fill="#5be37d"/>
  </g>

  <rect x="0.5" y="0.5" width="511" height="511" stroke="#1d2230"/>
</svg>
