<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="glimpse, the image API for developers">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="#2a3142"/>
    </pattern>
    <radialGradient id="dotfade" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.35" stop-color="#000000"/>
      <stop offset="1" stop-color="#ffffff"/>
    </radialGradient>
    <radialGradient id="glowAccent">
      <stop offset="0" stop-color="#6088d5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6088d5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen">
      <stop offset="0" stop-color="#5be37d" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#5be37d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0b0f"/>

  <mask id="dotmask">
    <rect width="1200" height="630" fill="url(#dotfade)"/>
  </mask>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.35" mask="url(#dotmask)"/>

  <circle cx="1120" cy="-60" r="380" fill="url(#glowAccent)"/>
  <circle cx="60" cy="700" r="340" fill="url(#glowGreen)"/>

  <rect x="0" y="0" width="1200" height="1" fill="#1d2230"/>
  <rect x="0" y="629" width="1200" height="1" fill="#1d2230"/>

  <text x="600" y="88" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="500" letter-spacing="4" fill="#6b7280">// GLIMPSE CLI</text>

  <circle cx="600" cy="216" r="160" fill="url(#glowAccent)"/>
  <g transform="translate(600 216) scale(2) translate(-100 -100)">
    <g stroke="#e6e6e3" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M22 100 Q100 54 178 100 Q100 146 22 100 Z"/>
      <circle cx="100" cy="100" r="22"/>
    </g>
    <circle cx="100" cy="100" r="6.5" fill="#5be37d"/>
  </g>

  <text x="600" y="420" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="92" font-weight="800" letter-spacing="-2" fill="#e6e6e3">glimpse</text>

  <text x="600" y="486" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="36" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#e6e6e3">The image API for </tspan><tspan fill="#6088d5">developers</tspan><tspan fill="#e6e6e3">.</tspan>
  </text>

  <text x="600" y="538" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#9aa0ad">Convert, optimize, resize, thumbnail and inspect images from your</text>
  <text x="600" y="572" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#9aa0ad">terminal, with <tspan fill="#5be37d">zero</tspan> image binaries installed on your machine.</text>
</svg>
