name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4
        with:
          path: glimpse-cli

      # The composer path repository at ../glimpse-php needs the SDK
      # checkout next to the CLI until the SDK is on Packagist.
      - uses: actions/checkout@v4
        with:
          repository: mathiasgrimm/glimpse-php
          path: glimpse-php

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
        working-directory: glimpse-cli

      - name: Run checks
        run: composer ci:check
        working-directory: glimpse-cli
